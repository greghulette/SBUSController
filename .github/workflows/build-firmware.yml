# ─────────────────────────────────────────────────────────────────────────
#  Build SBUSController firmware (WCB v3.2 / ESP32-S3) and commit the
#  resulting .bin files back to firmware/.  The browser flasher
#  (docs/flasher.js, reached via the config tool's Firmware section) reads
#  firmware/ on main via the GitHub Contents API, so a fresh build is
#  available to any connected user the moment this workflow finishes.
#
#  Pattern mirrors greghulette/NaviCore's build-firmware.yml, trimmed to
#  SBUSController's single ESP32-S3 variant and library set.
#
#  Trigger: a push to main that changes SKETCH SOURCE (the .ino / .h, the
#  build script, or this workflow).  Changes to docs/ (config tool, flasher.js,
#  generated index.html), the README, or the committed .bin files do NOT
#  recompile — they can't change the firmware binary.  The auto-commit carries
#  "[skip ci]" so it never re-triggers.  Manual run via workflow_dispatch.
# ─────────────────────────────────────────────────────────────────────────
name: Build SBUSController firmware

on:
  push:
    branches: [main]
    paths:
      - '**.ino'
      - '**.h'
      - '**.cpp'
      - 'tools/build-firmware.sh'
      - '.github/workflows/build-firmware.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Sync GitHub Pages copy from SBUSController_html.h
        # SBUSController_html.h is the single source of truth (embedded in the
        # firmware). docs/index.html is its generated GitHub Pages mirror.
        # Regenerate it here so a push that edits the .h keeps the hosted page
        # in sync automatically — no manual `python sync_html.py` step. If the
        # .h didn't change the HTML body, this is a no-op (nothing to commit).
        run: python3 sync_html.py

      - name: Install Arduino CLI
        run: |
          curl -fsSL https://raw.githubusercontent.com/arduino/arduino-cli/master/install.sh | BINDIR=/usr/local/bin sh
          arduino-cli version

      - name: Install ESP32 platform
        # Pinned to 3.3.4 to match the NaviCore / WCB known-good baseline.
        run: |
          arduino-cli core update-index \
            --additional-urls https://raw.githubusercontent.com/espressif/arduino-esp32/gh-pages/package_esp32_index.json
          arduino-cli core install esp32:esp32@3.3.4 \
            --additional-urls https://raw.githubusercontent.com/espressif/arduino-esp32/gh-pages/package_esp32_index.json

      - name: Install libraries
        # Mirrors the #include set in SBUSController.ino:
        #   ArduinoJson, Adafruit NeoPixel        — Library Manager (pinned)
        #   AsyncTCP + ESPAsyncWebServer          — ESP32Async fork (mathieucarbou),
        #     required for ESP32 core 3.x; installed by git-url for an
        #     unambiguous source (Library-Manager names collide with me-no-dev's).
        # LittleFS / WiFi / ESPmDNS ship with the ESP32 core.
        #
        # VERSIONS: ArduinoJson@7.4.3 matches NaviCore's pin. SBUSController.ino
        # uses the v7 `JsonDocument` type, so it REQUIRES ArduinoJson 7.x — keep
        # this aligned with whatever version your Arduino IDE builds with on the
        # bench so CI binaries match bench binaries.
        run: |
          arduino-cli config set library.enable_unsafe_install true
          arduino-cli lib install "ArduinoJson@7.4.3"
          arduino-cli lib install "Adafruit NeoPixel@1.15.4"
          arduino-cli lib install --git-url https://github.com/ESP32Async/AsyncTCP.git
          arduino-cli lib install --git-url https://github.com/ESP32Async/ESPAsyncWebServer.git

      - name: Build firmware
        run: |
          chmod +x tools/build-firmware.sh
          tools/build-firmware.sh

      - name: Commit binaries + synced Pages copy
        # Commits the freshly-built firmware bins AND the regenerated
        # docs/index.html (only the ones that actually changed). "[skip ci]"
        # prevents this auto-commit from re-triggering the workflow.
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Auto-build: firmware binaries + synced Pages UI [skip ci]"
          file_pattern: "firmware/*.bin docs/index.html"
          commit_user_name:  "github-actions[bot]"
          commit_user_email: "41898282+github-actions[bot]@users.noreply.github.com"
